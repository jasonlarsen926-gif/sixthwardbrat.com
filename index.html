<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sixth Ward Brat</title>
  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #f3efe7;
      color: #1f1a17;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .wrap {
      max-width: 990px;
      text-align: center;
    }
    img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      margin-bottom: 30px;
    }
    h1 {
      font-size: 3rem;
      margin: 0 0 10px;
      letter-spacing: 0.03em;
    }
    p {
      font-size: 1.2rem;
      line-height: 1.6;
      max-width: 700px;
      margin: 0 auto 16px;
    }
    .small {
      font-size: 0.95rem;
      opacity: 0.8;
    }
    a {
      color: inherit;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="wrap">
      <h1>Welcome to the Sixth Ward Brat</h1>
      <p><em>The Landing page for author Jason Larsen</em></p>
      <p>
        Future home of the <em> Jacob Langley Chronicles</em>. Novel coming 2027</p>p>
        
        <p>A Helena story in the making — memory, place, and adventure
        tangled together at the edges of class, history, and belonging.</p>
      <img src="author.png" alt="Author portrait" />
      </p>
      <p class="small">
        More soon.
      </p>
    </div>
  </section>
</body>
</html>
